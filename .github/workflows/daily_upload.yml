name: CA Prompt Vault — Daily YouTube Short

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies install
        run: |
          pip install anthropic -q
          sudo apt-get install -y espeak ffmpeg -q

      - name: Video banao aur upload karo
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          YT_CLIENT_ID:       ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:   ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:   ${{ secrets.YT_REFRESH_TOKEN }}
          BGM_B64:            ${{ secrets.BGM_B64 }}
        run: python scripts/run.py

      - name: Tracker save karo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Card uploaded"
          file_pattern: "used_cards.json"
